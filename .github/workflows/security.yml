name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 4 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trufflehog:
    name: TruffleHog verified secret scan
    # The upstream action compares base/head commits. On a push to main, base and
    # head can resolve to the same commit and fail with "BASE and HEAD commits
    # are the same". Keep this as a PR gate where the diff is well-defined.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

  semgrep:
    name: Semgrep OSS SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan
        run: semgrep scan --config auto --sarif --output semgrep.sarif --error
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  osv:
    name: OSV dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google/osv-scanner-action/osv-scanner-action@v2.0.1
        with:
          scan-args: |-
            --recursive
            .

  rust-security:
    name: Rust dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect Rust workspace
        id: rust
        run: |
          if [ -f Cargo.toml ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
      - name: Install Rust
        if: steps.rust.outputs.present == 'true'
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit and cargo-deny
        if: steps.rust.outputs.present == 'true'
        run: cargo install cargo-audit cargo-deny --locked
      - name: cargo audit
        if: steps.rust.outputs.present == 'true'
        run: cargo audit
      - name: cargo deny
        if: steps.rust.outputs.present == 'true'
        run: cargo deny check
      - name: No Rust workspace yet
        if: steps.rust.outputs.present != 'true'
        run: echo "No Cargo.toml yet; Rust dependency scans will activate when the workspace is added."
