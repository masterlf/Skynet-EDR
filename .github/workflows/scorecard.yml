name: OpenSSF Scorecard
on:
  branch_protection_rule:
  schedule:
    - cron: '45 5 * * 1'
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Run analysis
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: false
      - name: Keep Scorecard as CI signal only
        run: |
          echo "Scorecard SARIF upload is intentionally disabled."
          echo "Reason: Scorecard posture findings were flooding code scanning alerts."
          echo "Use this workflow log as the posture report; keep CodeQL/Semgrep/Trivy for code scanning."
