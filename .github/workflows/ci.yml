name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  rust:
    name: Rust quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Detect Rust workspace
        id: rust
        run: |
          if [ -f Cargo.toml ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
      - name: Install Rust
        if: steps.rust.outputs.present == 'true'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        if: steps.rust.outputs.present == 'true'
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Format check
        if: steps.rust.outputs.present == 'true'
        run: cargo fmt --all -- --check
      - name: Clippy
        if: steps.rust.outputs.present == 'true'
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Tests
        if: steps.rust.outputs.present == 'true'
        run: cargo test --workspace --all-features
      - name: No Rust workspace yet
        if: steps.rust.outputs.present != 'true'
        run: echo "No Cargo.toml yet; Rust CI will activate when the workspace is added."
  python:
    name: Python integration quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Detect Python integration
        id: py
        run: |
          if find integrations -name 'pyproject.toml' -o -name 'requirements.txt' 2>/dev/null | grep -q .; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
      - name: No Python integration yet
        if: steps.py.outputs.present != 'true'
        run: echo "No Python integration package yet; Python CI will activate when added."
      - name: Python checks deferred
        if: steps.py.outputs.present == 'true'
        run: |
          echo "Python integration detected."
          echo "Add a pinned Python toolchain workflow with hashed requirements before enabling checks."
          exit 1
