name: Packaging release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional package version override; defaults to Cargo package version"
        required: false
        type: string
  release:
    types: [published]
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package:
    name: Build and inspect Linux packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NFPM_VERSION: v2.46.3
      NFPM_ARCH: amd64
      NFPM_RPM_ARCH: x86_64
      NFPM_ARCHLINUX_ARCH: x86_64
      NFPM_SHA256: 9170d25ea056d7329def38134b2bcad98d02d221f8331610dcd619e84d28c565
      SKYNET_EDR_VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install package inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends curl ca-certificates rpm zstd

      - name: Install nFPM
        run: |
          archive="nfpm_${NFPM_VERSION#v}_Linux_x86_64.tar.gz"
          curl -fsSLO "https://github.com/goreleaser/nfpm/releases/download/${NFPM_VERSION}/${archive}"
          printf '%s  %s\n' "${NFPM_SHA256}" "${archive}" | sha256sum -c -
          tar -xzf "${archive}" nfpm
          sudo install -m 0755 nfpm /usr/local/bin/nfpm
          nfpm --version

      - name: Validate packaging metadata
        run: packaging/scripts/validate-packaging.sh

      - name: Validate package version override
        run: |
          if [ -n "${SKYNET_EDR_VERSION}" ]; then
            case "${SKYNET_EDR_VERSION}" in
              *[!0-9A-Za-z.+~-]*|.*|-*|*..*)
                echo "invalid SKYNET_EDR_VERSION: ${SKYNET_EDR_VERSION}" >&2
                exit 1
                ;;
            esac
          fi

      - name: Prepare clean dist directory
        run: rm -rf dist

      - name: Build tarball artifact
        run: packaging/scripts/build-tarball.sh

      - name: Build deb/rpm/Arch artifacts with nFPM
        run: packaging/scripts/build-packages.sh

      - name: Inspect package contents and generate checksums
        run: packaging/scripts/inspect-artifacts.sh dist

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: skynet-edr-linux-amd64-packages
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
            dist/*.pkg.tar.zst
            dist/checksums.txt
            dist/inspection/*.txt
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release for version tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > dist/release-notes.md <<'NOTES'
          # Skynet-EDR passive Linux-first MVP

          This is the first installable MVP release of Skynet-EDR.

          ## What works
          - Installable Linux `amd64` packages: Debian/Ubuntu `.deb`, RPM, Arch `.pkg.tar.zst`, and custom tarball.
          - Passive daemon service path: `skynet-edr-daemon run --config /etc/skynet-edr/config.toml`.
          - Local CLI storage: initialize SQLite store, ingest events, list/show/export events and incidents.
          - Hermes/AI-agent trace ingestion with redaction.
          - MVP correlation rule `EDR-EXFIL-001`: secret/sensitive file access followed by network egress opens a critical incident.
          - Read-only local API/MCP visibility surfaces.

          ## Install quickly
          Download the package for your distribution and `checksums.txt`, then verify:

          ```bash
          sha256sum -c checksums.txt --ignore-missing
          ```

          Debian/Ubuntu/Mint:

          ```bash
          sudo apt install ./skynet-edr_0.1.0_amd64.deb
          skynet-edr --version
          skynet-edr-daemon status
          ```

          RHEL/Fedora-compatible:

          ```bash
          sudo dnf install ./skynet-edr-0.1.0-1.x86_64.rpm
          ```

          Arch:

          ```bash
          sudo pacman -U ./skynet-edr-0.1.0-1-x86_64.pkg.tar.zst
          ```

          Tarball:

          ```bash
          tar -xzf skynet-edr-0.1.0-x86_64-unknown-linux-gnu.tar.gz
          cd skynet-edr-0.1.0-x86_64-unknown-linux-gnu
          sha256sum -c SHA256SUMS
          sudo ./install.sh
          ```

          ## Important maturity note
          This is an MVP/pre-production security tool. It is passive-first and does not yet claim full production EDR coverage, privileged kernel/eBPF sensors, signed packages, SBOMs, or distro repositories. The packages are usable for evaluation/lab deployment and initial passive testing.
          NOTES
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              dist/*.tar.gz \
              dist/*.deb \
              dist/*.rpm \
              dist/*.pkg.tar.zst \
              dist/checksums.txt \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              dist/*.tar.gz \
              dist/*.deb \
              dist/*.rpm \
              dist/*.pkg.tar.zst \
              dist/checksums.txt \
              --title "Skynet-EDR ${GITHUB_REF_NAME} — passive Linux-first MVP" \
              --notes-file dist/release-notes.md \
              --prerelease \
              --verify-tag
          fi

  attach-release-assets:
    name: Attach packages to GitHub release
    if: github.event_name == 'release'
    needs: package
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: skynet-edr-linux-amd64-packages
          path: dist

      - name: Attach artifacts to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/*.tar.gz \
            dist/*.deb \
            dist/*.rpm \
            dist/*.pkg.tar.zst \
            dist/checksums.txt \
            --clobber
