name: CodeQL
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '33 3 * * 2'
permissions:
  contents: read
jobs:
  analyze:
    name: CodeQL analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [rust, python]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Detect language files
        id: detect
        shell: bash
        run: |
          case "${{ matrix.language }}" in
            rust)
              if find . -name '*.rs' | grep -q .; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
              ;;
            python)
              if find . -name '*.py' | grep -q .; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
              ;;
          esac
      - name: Initialize CodeQL
        if: steps.detect.outputs.present == 'true'
        uses: github/codeql-action/init@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb # v3
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        if: steps.detect.outputs.present == 'true'
        uses: github/codeql-action/autobuild@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb # v3
      - name: Perform CodeQL Analysis
        if: steps.detect.outputs.present == 'true'
        uses: github/codeql-action/analyze@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb # v3
      - name: No files for language yet
        if: steps.detect.outputs.present != 'true'
        run: echo "No ${{ matrix.language }} files yet; CodeQL will activate when code is added."
